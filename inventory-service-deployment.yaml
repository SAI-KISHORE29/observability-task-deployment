apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  labels:
    app: inventory-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        service: inventory-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: inventory-service
          image: saikishore29/fastapi-inventory-service:fcc73f35
          env:
            - name: SERVICE_NAME
              value: "Inventory Service"
          ports:
            - containerPort: 3000